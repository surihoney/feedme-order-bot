services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedme-order-bot
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    command: npm run dev -- --host 0.0.0.0
    stdin_open: true
    tty: true
